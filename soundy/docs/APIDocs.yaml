components:
  schemas:
    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          title: Comment ID
        member:
          allOf:
          - $ref: '#/components/schemas/MemberMini'
          readOnly: true
        track:
          allOf:
          - $ref: '#/components/schemas/Track'
          readOnly: true
        member_id:
          type: string
          format: uuid
          title: Member ID
          writeOnly: true
        track_id:
          type: string
          format: uuid
          title: Track ID
          writeOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        content:
          type: string
          title: Comment Content
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - member
      - member_id
      - track
      - track_id
      - updated_at
    GenreEnum:
      enum:
      - Pop
      - Rock
      - Jazz
      - Classical
      - HipHop
      - Electronic
      - Country
      - Reggae
      - Blues
      - Metal
      - Folk
      - RnB
      - Arabic
      - Other
      type: string
      description: |-
        * `Pop` - Pop
        * `Rock` - Rock
        * `Jazz` - Jazz
        * `Classical` - Classical
        * `HipHop` - HipHop
        * `Electronic` - Electronic
        * `Country` - Country
        * `Reggae` - Reggae
        * `Blues` - Blues
        * `Metal` - Metal
        * `Folk` - Folk
        * `RnB` - RnB
        * `Arabic` - Arabic
        * `Other` - Other
    Member:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        password:
          type: string
          writeOnly: true
        birth_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          nullable: true
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        is_staff:
          type: boolean
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
        username:
          type: string
          title: Member Name
          maxLength: 50
        email:
          type: string
          format: email
          title: Member Email
          maxLength: 254
        personal_img:
          type: string
          format: uri
          nullable: true
          title: Member Image
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: Member Update
        groups:
          type: array
          items:
            type: integer
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
        user_permissions:
          type: array
          items:
            type: integer
          description: Specific permissions for this user.
      required:
      - birth_date
      - created_at
      - email
      - id
      - password
      - updated_at
      - username
    MemberMini:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          title: Member Name
          maxLength: 50
      required:
      - id
      - username
    Owner:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          title: Member ID
        username:
          type: string
          title: Member Name
          maxLength: 50
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
      required:
      - id
      - username
    PatchedComment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          title: Comment ID
        member:
          allOf:
          - $ref: '#/components/schemas/MemberMini'
          readOnly: true
        track:
          allOf:
          - $ref: '#/components/schemas/Track'
          readOnly: true
        member_id:
          type: string
          format: uuid
          title: Member ID
          writeOnly: true
        track_id:
          type: string
          format: uuid
          title: Track ID
          writeOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        content:
          type: string
          title: Comment Content
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        password:
          type: string
          writeOnly: true
        birth_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          nullable: true
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        is_staff:
          type: boolean
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
        username:
          type: string
          title: Member Name
          maxLength: 50
        email:
          type: string
          format: email
          title: Member Email
          maxLength: 254
        personal_img:
          type: string
          format: uri
          nullable: true
          title: Member Image
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: Member Update
        groups:
          type: array
          items:
            type: integer
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
        user_permissions:
          type: array
          items:
            type: integer
          description: Specific permissions for this user.
    PatchedPlaylistwriting:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner:
          allOf:
          - $ref: '#/components/schemas/Owner'
          readOnly: true
        owner_id:
          type: string
          format: uuid
          title: Member ID
          writeOnly: true
        tracks:
          type: array
          items:
            type: string
            format: uuid
            title: Track ID
        tracks_count:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 100
        cover:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
